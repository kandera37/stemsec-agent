patterns:
  - id: sql_injection
    name: SQL Injection
    severity_default: high
    description: Untrusted input changes the structure of a SQL query.
    common_signals:
      - SQL query built with f-string
      - SQL query built with string concatenation
      - Raw query contains request parameters directly
    typical_safe_pattern:
      - parameterized query with placeholders and bound parameters
    examples:
      - "SELECT * FROM users WHERE name = '%s'"
      - f"SELECT * FROM users WHERE id = {user_id}"

  - id: xss
    name: Cross-Site Scripting
    severity_default: medium
    description: User-controlled content is rendered into HTML without safe escaping.
    common_signals:
      - render_template_string with raw input
      - HTMLResponse built from user input
      - string interpolation into HTML fragments
    typical_safe_pattern:
      - trusted templating with automatic escaping
      - explicit escaping before HTML rendering

  - id: path_traversal
    name: Path Traversal
    severity_default: high
    description: User-controlled path or filename influences file access.
    common_signals:
      - open(base + user_filename)
      - send_file using request parameter directly
      - path joined with untrusted filename and no normalization checks
    typical_safe_pattern:
      - strict allowlist of files
      - normalized path constrained to safe directory

  - id: command_injection
    name: Command Injection
    severity_default: critical
    description: Untrusted input reaches shell or system command execution.
    common_signals:
      - subprocess.run(..., shell=True) with user input
      - os.system with request parameter
      - command string assembled from request data
    typical_safe_pattern:
      - no shell=True
      - fixed command with validated arguments

  - id: broken_access_control
    name: Broken Access Control
    severity_default: high
    description: A user can access or modify a resource without proper authorization checks.
    common_signals:
      - only logged-in check, no ownership check
      - admin endpoint without role enforcement
      - object fetched by id without access validation
    typical_safe_pattern:
      - explicit ownership or role verification before access

  - id: idor
    name: Insecure Direct Object Reference
    severity_default: high
    description: Resource identifiers can be changed to access another user's data.
    common_signals:
      - invoice_id or user_id taken from request and used directly
      - object lookup without owner constraint
    typical_safe_pattern:
      - object query constrained by current user identity

  - id: hardcoded_secret
    name: Hardcoded Secret
    severity_default: medium
    description: Sensitive secret material is embedded directly in source code.
    common_signals:
      - app.secret_key assigned to literal string
      - API token stored directly in code
    typical_safe_pattern:
      - secret loaded from environment or secret manager

  - id: open_redirect
    name: Open Redirect
    severity_default: medium
    description: User controls redirect destination without sufficient validation.
    common_signals:
      - redirect(request.args.get("next"))
      - redirect target passed through directly
    typical_safe_pattern:
      - allowlisted relative paths only

  - id: insecure_file_upload
    name: Insecure File Upload
    severity_default: high
    description: Uploaded files are accepted and stored without robust validation.
    common_signals:
      - file saved directly using client-provided filename
      - no file type or extension checks
      - upload path not constrained safely
    typical_safe_pattern:
      - generated safe filename
      - extension/type validation
      - controlled upload directory

  - id: ssrf
    name: Server-Side Request Forgery
    severity_default: high
    description: Server makes outbound request to attacker-controlled URL.
    common_signals:
      - requests.get(user_url)
      - httpx call to request-provided URL
    typical_safe_pattern:
      - destination allowlist
      - rejection of internal/private network targets

  - id: sensitive_data_exposure
    name: Sensitive Data Exposure
    severity_default: medium
    description: Sensitive data is exposed through logs or responses.
    common_signals:
      - logging bearer tokens
      - returning private identifiers or credentials
    typical_safe_pattern:
      - redaction or omission of secrets from logs and outputs

  - id: unsafe_eval
    name: Unsafe Eval
    severity_default: critical
    description: Untrusted input is executed as code or expression.
    common_signals:
      - eval(user_expression)
      - exec(user_code)
    typical_safe_pattern:
      - no dynamic evaluation of untrusted input

  - id: sensitive_config_exposure
    name: Sensitive Config Exposure
    severity_default: medium
    description: Internal configuration or environment details are exposed through an endpoint.
    common_signals:
      - endpoint returns env variables
      - debug/config dump accessible remotely
    typical_safe_pattern:
      - no sensitive configuration exposed in application responses